<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Streak</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Header -->
  <header class="app-header">
    <div class="app-brand">
      <span class="app-icon">🔥</span>
      <h1 class="app-title">Streak</h1>
    </div>
    <div class="add-btn" id="addHabitBtn" aria-label="Add habit">+</div>
  </header>

  <!-- Habit List -->
  <main class="habit-list" id="habitList">

    <!-- Empty State -->
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🔥</div>
      <h2 class="empty-title">No habits yet</h2>
      <p class="empty-sub">Start building your streak</p>
      <button class="empty-btn" id="emptyAddBtn">Add your first</button>
    </div>

  </main>

  <!-- Add Habit Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">

      <div class="modal-header">
        <h2 class="modal-title">New Habit</h2>
        <button class="close-btn" id="closeModal" aria-label="Close">✕</button>
      </div>

      <input
        type="text"
        class="habit-input"
        id="habitInput"
        placeholder="Name your habit..."
        maxlength="30"
        autocomplete="off"
      />

      <div class="presets-label">Or choose a preset</div>
      <div class="presets-grid" id="presetsGrid"></div>

      <button class="confirm-btn" id="confirmBtn">Add Habit</button>

    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div class="modal-overlay" id="deleteOverlay">
    <div class="modal modal--small">
      <h2 class="modal-title">Delete Habit?</h2>
      <p class="delete-sub">Your streak will be lost forever.</p>
      <div class="delete-actions">
        <button class="cancel-btn" id="cancelDelete">Cancel</button>
        <button class="delete-btn" id="confirmDelete">Delete</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
